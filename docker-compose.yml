version: '3.8'

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: product-catalog-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
            - /var/www/vendor
        networks:
            - product-network
        depends_on:
            - db
            - redis

    web:
        image: nginx:alpine
        container_name: product-catalog-web
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - product-network
        depends_on:
            - app

    db:
        image: postgres:15-alpine
        container_name: product-catalog-db
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        ports:
            - "5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
        networks:
            - product-network

    redis:
        image: redis:7-alpine
        container_name: product-catalog-redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        networks:
            - product-network

volumes:
    postgres-data:

networks:
    product-network:
        driver: bridge
